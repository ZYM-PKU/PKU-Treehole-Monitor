# ============================================================
# PKU Treehole 监控配置文件
# ============================================================

# --- PKU IAAA 登录凭据 ---
pku:
  username: ""          # 学号/职工号
  password: ""          # 密码

# --- 监控设置 ---
monitor:
  interval_seconds: 5         # 轮询间隔（秒）
  max_pages: 1                # 每次检查的最大页数
  posts_per_page: 25           # 每页帖子数量（API 默认 25）

# --- 关键词匹配 ---
# mode: "AND" 表示所有关键词都必须出现; "OR" 表示任一出现即可
keywords:
  mode: "AND"
  list:
    - ""

# --- 邮件提醒设置 ---
email:
  enabled: true
  smtp_server: "smtp.qq.com"       # SMTP 服务器地址
  smtp_port: 465                   # SMTP 端口（SSL）
  use_ssl: true                    # 是否使用 SSL
  sender: ""                       # 发件人邮箱
  password: ""                     # 邮箱授权码（非登录密码）
  receiver: ""                     # 收件人邮箱（可与发件人相同）
  subject_prefix: "[树洞监控]"     # 邮件主题前缀

# --- 系统提示音提醒（macOS） ---
sound:
  enabled: true                    # 是否开启系统提示音